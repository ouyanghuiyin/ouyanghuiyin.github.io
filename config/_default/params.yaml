# SITE SETUP
# Guide: https://wowchemy.com/docs/getting-started/
# Documentation: https://wowchemy.com/docs/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

###########################
# Appearance
###########################

theme: my_theme # Replace with your theme name, if applicable
day_night: true # Enable day/night mode toggle
font: 'native' # Font type (options: 'native', 'serif', 'sans-serif', or custom font family)
font_size: M # Font size (options: XS, S, M, L, XL)

###########################
# SEO
###########################

site_type: Person # Options: 'Person', 'Organization', 'Website', etc.
local_business_type: '' # Specify business type if applicable
org_name: '' # Organization name
description: '' # Short description of your website
twitter: '' # Your Twitter handle (e.g., '@example'), if applicable

###########################
