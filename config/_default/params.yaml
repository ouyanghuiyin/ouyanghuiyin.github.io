###########################
# Site Header
###########################

main_menu:
  enable: true # Enable the navigation menu
  align: l # Menu alignment (options: 'l', 'c', 'r' for left, center, right)
  show_logo: true # Show site logo in the menu
  show_language: false # Enable/disable language selector
  show_day_night: true # Show day/night toggle in the menu
  show_search: false # Enable/disable search bar
  highlight_active_link: true # Highlight the active link in the menu

###########################
# Localization
###########################

date_format: 'Jan 2, 2006' # Date format
time_format: '3:04 PM' # Time format
address_format: en-us # Address format (e.g., 'en-us', 'fr-fr')

###########################
# Site Features
###########################

highlight: true # Enable syntax highlighting
highlight_languages: # List programming languages to highlight
  - r
math: true # Enable LaTeX math rendering
diagram: false # Enable diagram support (e.g., Mermaid.js)
privacy_pack: false # Enable privacy pack
edit_page:
  repo_url: '' # Repository URL for editing content
  content_dir: '' # Directory for editable content
  repo_branch: main
  editable:
    page: false
    post: false
    book: false
show_related:
  book: true
  page: false
  post: true
  project: true
  publication: true
  event: true
reading_time: true # Show estimated reading time for posts
section_pager: false # Disable pagination for sections
docs_section_pager: true # Enable pagination for docs sections
sharing: true # Enable social sharing buttons
copyright_license:
  enable: false # Enable copyright notice
  allow_derivatives
